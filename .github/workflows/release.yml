name: Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build zip
        run: bash scripts/package_app.sh "${GITHUB_REF_NAME:-manual}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name || 'manual' }}
        run: |
          set -euo pipefail

          ZIP_PATH="$(find dist -name 'OodiPop-*-macOS.zip' -type f | head -n 1)"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RELEASE_TAG="$TAG_NAME"
          else
            RELEASE_TAG="manual-${GITHUB_RUN_NUMBER}"
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$ZIP_PATH" --title "$RELEASE_TAG" --generate-notes
          fi
